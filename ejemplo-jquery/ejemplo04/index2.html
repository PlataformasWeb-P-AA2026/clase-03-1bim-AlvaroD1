<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width" />
        <title>Demo Jquery Local</title>

        <link rel="stylesheet" href="jquery-ui.css" />
        <script src="jquery-3.5.0.js"></script>
        <script src="jquery-ui.js"></script>
    </head>
    <body>
        <h2>Ejemplo de Uso de jQuery y jQueryUI (Local)</h2>
        <div id="accordion">
            <h3>Sección 1</h3>
            <div>
                <p id="nombreCarrera">Tecnologías de la Información</p>
                <p id="nombreUniversidad">
                    Universidad Técnica Particular de Loja
                </p>
                <button type="submit">Generar Mensaje</button>
            </div>
            <h3>Sección 2</h3>
            <div><p id="mensajeFinal"></p></div>
            <h3>Sección 3</h3>
            <div><p id="mensajeFinal2"></p></div>
            <h3>Sección 4</h3>
            <div><p id="mensajeFinal3"></p></div>
        </div>
    </body>

    <script>
        $(document).ready(function () {
            $("#accordion").accordion({
                collapsible: true,
            });

            $("button").click(function () {
                var texto1 = $("#nombreCarrera").text();
                var texto2 = $("#nombreUniversidad").text();
                var mensaje =
                    "Su carrera es: " +
                    texto1 +
                    ". Su universidad es " +
                    texto2;

                $("#mensajeFinal").text(mensaje);
                $("#mensajeFinal2").text(mensaje);
                $("#mensajeFinal3").text(mensaje);

                console.log("Datos procesados localmente: " + texto1);
            });
        });
    </script>
</html>
