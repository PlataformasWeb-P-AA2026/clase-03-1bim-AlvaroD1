<!doctype html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Lista de Instituciones</title>
        <script src="https://code.jquery.com/jquery-3.5.0.js"></script>
    </head>
    <body>
        <ul id="lista"></ul>

        <script>
            $(document).ready(function () {
                // Lee el archivo JSON original directamente
                $.getJSON("data_instituciones.json", function (data) {
                    // Recorre cada objeto del JSON
                    $.each(data, function (i, inst) {
                        // Agrega el nombre a la lista
                        $("#lista").append(
                            "<li>" + inst["Nombre-Educativa"] + "</li>",
                        );
                    });
                });
            });
        </script>
    </body>
</html>
